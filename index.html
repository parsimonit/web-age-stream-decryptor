<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Browser Decryptor</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        line-height: 1.6;
        color: #333;
        background: #f5f5f5;
        padding: 2rem;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        margin-bottom: 1.5rem;
        font-size: 1.8rem;
        color: #2c3e50;
      }

      form {
        margin-bottom: 2rem;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #555;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 1rem;
      }

      input:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
      }

      button {
        background: #3498db;
        color: white;
        padding: 0.75rem 2rem;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      .button-row {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      #copy-link-button {
        background: #7f8c8d;
      }

      #copy-link-button:hover:not(:disabled) {
        background: #6b7778;
      }

      button:hover:not(:disabled) {
        background: #2980b9;
      }

      button:disabled {
        background: #95a5a6;
        cursor: not-allowed;
      }

      button.loading {
        position: relative;
        color: transparent;
      }

      button.loading::after {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        top: 50%;
        left: 50%;
        margin-left: -8px;
        margin-top: -8px;
        border: 2px solid white;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #error-banner {
        display: none;
        background: #e74c3c;
        color: white;
        padding: 1rem;
        border-radius: 4px;
        margin-bottom: 1.5rem;
      }

      #error-banner.show {
        display: block;
      }

      #status-area {
        border: 1px solid #ddd;
        border-radius: 4px;
        background: #fafafa;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Age Browser Decryptor</h1>

      <div id="error-banner"></div>

      <form id="decrypt-form">
        <div class="form-group">
          <label for="file-url">Encrypted File URL</label>
          <input
            type="text"
            id="file-url"
            name="fileUrl"
            placeholder="https://example.com/file.age"
            required
          />
        </div>

        <div class="form-group">
          <label for="passphrase">Passphrase</label>
          <input
            type="password"
            id="passphrase"
            name="passphrase"
            placeholder="Enter passphrase"
            required
          />
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="force-download" name="forceDownload" />
            Force download
          </label>
        </div>

        <div class="button-row">
          <button type="submit" id="decrypt-button">Decrypt</button>
          <button type="button" id="copy-link-button">Copy Link</button>
        </div>
      </form>

      <div id="status-area"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
